<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something for You 💙</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at center, #0d1b4b 0%, #030a1f 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Dancing Script', cursive;
    overflow: hidden;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite var(--delay);
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .card {
    position: relative; z-index: 1;
    background: linear-gradient(145deg, #0d1b4b, #1a3a80);
    border: 2px solid #FFD700;
    border-radius: 28px;
    padding: 3rem 2.5rem;
    max-width: 420px; width: 90%;
    text-align: center;
    box-shadow: 0 0 60px #FFD70033, 0 20px 60px #00000088;
  }

  .card::before {
    content: '';
    position: absolute; inset: 0; border-radius: 28px;
    background: radial-gradient(ellipse at top, #FFD70011 0%, transparent 60%);
    pointer-events: none;
  }

  .lock-icon { font-size: 3.5rem; margin-bottom: 1rem; animation: float 3s ease-in-out infinite; }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  h1 {
    font-family: 'Pacifico', cursive;
    color: #FFD700; font-size: 1.8rem;
    text-shadow: 0 0 30px #FFD700aa;
    margin-bottom: 0.5rem;
  }

  .subtitle { color: #5BB8FF; font-size: 1.1rem; margin-bottom: 2rem; opacity: 0.9; }

  .input-wrap { position: relative; margin-bottom: 1.5rem; }

  input[type="password"], input[type="text"] {
    width: 100%;
    padding: 1rem 3rem 1rem 1.5rem;
    background: rgba(255,255,255,0.07);
    border: 2px solid #FFD70066;
    border-radius: 50px;
    color: #FFD700;
    font-family: 'Dancing Script', cursive;
    font-size: 1.4rem;
    outline: none; text-align: center;
    letter-spacing: 0.15em;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  input:focus { border-color: #FFD700; box-shadow: 0 0 20px #FFD70044; }
  input::placeholder { color: #FFD70066; letter-spacing: 0.05em; font-size: 1.1rem; }

  .toggle-pass {
    position: absolute; right: 1rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: #FFD70088; font-size: 1.3rem;
    cursor: pointer;
  }

  .submit-btn {
    width: 100%; padding: 1rem;
    background: linear-gradient(135deg, #C8960C, #FFD700);
    border: none; border-radius: 50px;
    font-family: 'Pacifico', cursive;
    font-size: 1.3rem; color: #1a0d00;
    cursor: pointer;
    box-shadow: 0 4px 20px #FFD70066;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }

  .submit-btn:hover { transform: scale(1.03); box-shadow: 0 6px 30px #FFD700aa; }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .error-msg {
    color: #ff6b6b; font-size: 1.1rem;
    margin-top: 1rem; min-height: 1.5rem;
    display: none;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .loading {
    display: none; flex-direction: column;
    align-items: center; gap: 1rem; margin-top: 1rem;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #FFD70033;
    border-top-color: #FFD700;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { color: #FFD700; font-size: 1.1rem; }
  .hint { color: #5BB8FF66; font-size: 0.95rem; margin-top: 1.5rem; }

  .ambient-heart {
    position: fixed; font-size: var(--size); opacity: 0.1;
    pointer-events: none; z-index: 0;
    animation: floatUp var(--dur) ease-in-out infinite var(--delay);
  }
  @keyframes floatUp {
    0% { transform: translateY(110vh); opacity: 0; }
    10% { opacity: 0.1; } 90% { opacity: 0.1; }
    100% { transform: translateY(-10vh); opacity: 0; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <div class="lock-icon">🔐</div>
  <h1>Something for You</h1>
  <p class="subtitle">Enter the secret password 💙</p>

  <div class="input-wrap">
    <input
      type="password"
      id="passInput"
      placeholder="✦ secret word ✦"
      autocomplete="off"
      autofocus
      onkeydown="if(event.key==='Enter') checkPass()"
    />
    <button class="toggle-pass" onclick="toggleVisibility()" tabindex="-1">👁</button>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="checkPass()">
    💙 Open
  </button>

  <div class="error-msg" id="errorMsg"></div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Opening… 💙</div>
  </div>

  <p class="hint">💛 Only one person knows this 💛</p>
</div>

<script>
// Stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 3 + 1;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;`;
  starsEl.appendChild(s);
}

// Ambient hearts
['💙','💛','✨','💙','⭐'].forEach((h, i) => {
  const el = document.createElement('div');
  el.className = 'ambient-heart';
  el.textContent = h;
  el.style.cssText = `left:${10+i*18}%;--size:${1.2+Math.random()}rem;--dur:${10+Math.random()*8}s;--delay:${Math.random()*8}s;`;
  document.body.appendChild(el);
});

// Toggle password visibility
function toggleVisibility() {
  const input = document.getElementById('passInput');
  input.type = input.type === 'password' ? 'text' : 'password';
}

// Rate limiting
let attempts = 0;
let lockedUntil = 0;

async function checkPass() {
  const input    = document.getElementById('passInput');
  const errorMsg = document.getElementById('errorMsg');
  const loading  = document.getElementById('loading');
  const btn      = document.getElementById('submitBtn');

  // Check lockout
  if (Date.now() < lockedUntil) {
    const secs = Math.ceil((lockedUntil - Date.now()) / 1000);
    showError(`Too many attempts 🔒 Wait ${secs}s`);
    return;
  }

  const pass = input.value.trim();
  if (!pass) { showError('Please enter the password 💙'); return; }

  // Show loading state
  errorMsg.style.display = 'none';
  loading.style.display  = 'flex';
  btn.disabled    = true;
  input.disabled  = true;

  try {
    const res  = await fetch('/api/check', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ password: pass })
    });

    const data = await res.json();

    if (data.success) {
      document.getElementById('loadingText').textContent = 'Welcome 💙';
      setTimeout(() => { window.location.href = '/proposal.html'; }, 800);
    } else {
      attempts++;
      loading.style.display = 'none';
      btn.disabled   = false;
      input.disabled = false;
      input.value    = '';
      input.focus();

      if (attempts >= 5) {
        lockedUntil = Date.now() + 30000; // 30 second lockout
        showError('Too many attempts 🔒 Wait 30 seconds');
        btn.disabled   = true;
        input.disabled = true;
        setTimeout(() => {
          attempts = 0;
          btn.disabled   = false;
          input.disabled = false;
          errorMsg.style.display = 'none';
        }, 30000);
      } else {
        showError(`Wrong password 💔 (${5 - attempts} tries left)`);
      }
    }
  } catch (err) {
    loading.style.display = 'none';
    btn.disabled   = false;
    input.disabled = false;
    showError('Connection error. Try again 💙');
  }
}

function showError(msg) {
  const errorMsg = document.getElementById('errorMsg');
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
  errorMsg.style.animation = 'none';
  errorMsg.offsetHeight;
  errorMsg.style.animation = 'shake 0.4s ease';
}

// Security
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12' || (e.ctrlKey && ['u','U','s','S','i','I','j','J'].includes(e.key)))
    e.preventDefault();
});
</script>
</body>
</html>
